services:
  # ── 1. PostgreSQL – Auth & BackOffice ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tinderlike_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tinderlike_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tinderlike_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. MongoDB – Perfiles y Detalles de Eventos ───────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: tinderlike_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Redis – Caché y Tiempo Real ────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: tinderlike_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 4. Cassandra – Persistencia Masiva / Swipes ───────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: tinderlike_cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: TinderLikeCluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 5. Neo4j – Grafo Social y Recomendaciones ─────────────────────────────
  neo4j:
    image: neo4j:5.12
    container_name: tinderlike_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── 6. Backend – FastAPI ──────────────────────────────────────────────────
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: tinderlike_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/tinderlike_auth
      MONGO_URI: mongodb://admin:password123@mongodb:27017
      MONGO_DB: tinderlike
      REDIS_URL: redis://redis:6379
      CASSANDRA_HOSTS: cassandra
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./BackEnd:/app

  # ── 7. Frontend – React / Vite ────────────────────────────────────────────
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: tinderlike_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./FrontEnd:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  cassandra_data:
  neo4j_data:
  neo4j_logs:
